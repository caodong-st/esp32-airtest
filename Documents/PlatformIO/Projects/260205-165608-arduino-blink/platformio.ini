[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_port = COM6
lib_deps =
    https://github.com/ThingPulse/esp8266-oled-ssd1306.git ; OLED驱动
    https://github.com/bblanchon/ArduinoJson.git   


